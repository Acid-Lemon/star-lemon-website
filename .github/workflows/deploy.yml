name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=4"

          echo "Starting remote deploy..."

          ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' \
            GITHUB_REPOSITORY='${{ github.repository }}' \
            GITHUB_REF_NAME='${{ github.ref_name }}' \
            GITHUB_SHA='${{ github.sha }}' \
            bash -s << 'ENDSSH'
          set -e
          APP_DIR="/opt/star-lemon"
          SAFE_REPO_URL="https://github.com/$GITHUB_REPOSITORY.git"
          AUTH_REPO_URL="https://x-access-token:$GITHUB_TOKEN@github.com/$GITHUB_REPOSITORY.git"

          cleanup_auth_remote() {
            git -C "$APP_DIR" remote set-url origin "$SAFE_REPO_URL" >/dev/null 2>&1 || true
          }
          trap cleanup_auth_remote EXIT

          echo "=== Star Lemon 1Panel Runtime Deploy ==="

          if ! command -v git >/dev/null 2>&1; then
            echo "ERROR: git is required on the server."
            exit 1
          fi

          if [ ! -d "$APP_DIR" ]; then
            echo "ERROR: $APP_DIR does not exist. Create it and give the deploy user write access first."
            exit 1
          fi

          if [ ! -w "$APP_DIR" ]; then
            echo "ERROR: $APP_DIR is not writable by the deploy user."
            exit 1
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "ERROR: docker is required to restart the 1Panel runtime container."
            exit 1
          fi

          echo "[1/3] Syncing source code..."
          if [ ! -d "$APP_DIR/.git" ]; then
            git -C "$APP_DIR" init -b "$GITHUB_REF_NAME"
          fi
          git -C "$APP_DIR" remote remove origin >/dev/null 2>&1 || true
          git -C "$APP_DIR" remote add origin "$AUTH_REPO_URL"

          for attempt in 1 2 3 4 5; do
            if git -C "$APP_DIR" -c http.version=HTTP/1.1 fetch --depth 1 origin "$GITHUB_REF_NAME"; then
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "ERROR: git fetch failed after 5 attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "git fetch failed; retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

          git -C "$APP_DIR" checkout -B "$GITHUB_REF_NAME" FETCH_HEAD
          git -C "$APP_DIR" reset --hard "$GITHUB_SHA"
          cleanup_auth_remote

          echo "[2/3] Restarting 1Panel runtime container..."
          docker restart star-lemon

          echo "[3/3] Deploy completed."
          ENDSSH
