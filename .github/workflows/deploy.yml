name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: star-lemon-website:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image
        run: docker save star-lemon-website:latest | gzip > /tmp/image.tar.gz

      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          scp $SSH_OPTS /tmp/image.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/tmp/

          ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} bash -s << 'ENDSSH'
          set -e
          DEPLOY_DIR=/opt/star-lemon

          echo "=== Star Lemon Docker Deploy ==="

          echo "[1/3] Loading image..."
          docker load < /tmp/image.tar.gz
          rm -f /tmp/image.tar.gz

          echo "[2/3] Restarting container..."
          cd "$DEPLOY_DIR"
          docker compose down || true
          docker compose up -d

          echo "[3/3] Health check..."
          sleep 5
          if docker ps | grep -q star-lemon-website; then
            echo "=== Deploy completed ==="
          else
            echo "ERROR: Container not running"
            docker logs star-lemon-website --tail 50
            exit 1
          fi
          ENDSSH
