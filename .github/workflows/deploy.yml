name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes"

          echo "Starting remote deploy..."

          ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            GHCR_USERNAME='${{ github.actor }}' \
            GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' \
            IMAGE='${{ steps.image.outputs.name }}:latest' \
            bash -s << 'ENDSSH'
          set -e
          DEPLOY_DIR=/opt/star-lemon

          echo "=== Star Lemon Docker Deploy ==="

          echo "[1/4] Logging in to GitHub Container Registry..."
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

          echo "[2/4] Pulling image..."
          docker pull "$IMAGE"
          docker tag "$IMAGE" star-lemon-website:latest

          echo "[3/4] Restarting container..."
          cd "$DEPLOY_DIR"
          docker compose down || true
          docker compose up -d

          echo "[4/4] Health check..."
          sleep 5
          if docker ps | grep -q star-lemon-website; then
            echo "=== Deploy completed ==="
          else
            echo "ERROR: Container not running"
            docker logs star-lemon-website --tail 50
            exit 1
          fi
          ENDSSH
