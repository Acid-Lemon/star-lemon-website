name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Create deploy archive
        run: |
          tar -czf deploy.tar.gz \
            --exclude=.next/cache \
            --exclude=.next/dev \
            package.json pnpm-lock.yaml next.config.ts \
            public .next scripts/remote-deploy.sh

      - name: Upload to server and deploy
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Use ssh command directly with options
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          # Upload archive
          scp $SSH_OPTS deploy.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/www/wwwroot/star-lemon.top/

          # Run remote deploy script
          ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "cd /www/wwwroot/star-lemon.top && bash scripts/remote-deploy.sh deploy.tar.gz"
