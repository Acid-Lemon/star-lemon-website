name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build Next.js standalone app
        run: |
          pnpm build
          mkdir -p .next/standalone/.next
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          tar -czf /tmp/star-lemon-standalone.tar.gz -C .next/standalone .
          ls -lh /tmp/star-lemon-standalone.tar.gz

      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=4"

          echo "Starting remote deploy..."

          echo "Uploading standalone bundle..."
          ls -lh /tmp/star-lemon-standalone.tar.gz
          if ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "command -v rsync >/dev/null 2>&1"; then
            rsync -az --info=progress2 -e "ssh $SSH_OPTS" /tmp/star-lemon-standalone.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/tmp/
          else
            echo "rsync is not available on the server; falling back to scp without progress output."
            scp $SSH_OPTS /tmp/star-lemon-standalone.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/tmp/
          fi

          ssh $SSH_OPTS ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} bash -s << 'ENDSSH'
          set -e
          APP_DIR="/opt/star-lemon"
          RELEASE_DIR="$APP_DIR/releases/${{ github.sha }}"
          SHARED_ENV="$APP_DIR/shared/.env.local"

          echo "=== Star Lemon Standalone Deploy ==="

          if ! command -v node >/dev/null 2>&1; then
            echo "ERROR: Node.js is required on the server."
            exit 1
          fi

          if [ ! -d "$APP_DIR" ]; then
            echo "ERROR: $APP_DIR does not exist. Create it and give the deploy user write access first."
            exit 1
          fi

          if [ ! -w "$APP_DIR" ]; then
            echo "ERROR: $APP_DIR is not writable by the deploy user."
            exit 1
          fi

          echo "[1/5] Preparing release directory..."
          mkdir -p "$RELEASE_DIR" "$APP_DIR/releases" "$APP_DIR/shared"
          tar -xzf /tmp/star-lemon-standalone.tar.gz -C "$RELEASE_DIR"
          rm -f /tmp/star-lemon-standalone.tar.gz

          echo "[2/5] Switching current release..."
          ln -sfn "$RELEASE_DIR" "$APP_DIR/current"

          echo "[3/5] Stopping previous app..."
          if [ -f "$APP_DIR/app.pid" ] && kill -0 "$(cat "$APP_DIR/app.pid")" 2>/dev/null; then
            kill "$(cat "$APP_DIR/app.pid")"
          fi

          echo "[4/5] Starting app..."
          cd "$APP_DIR/current"
          set -a
          [ -f "$SHARED_ENV" ] && . "$SHARED_ENV"
          set +a
          NODE_ENV=production PORT=3000 HOSTNAME=0.0.0.0 nohup node server.js > "$APP_DIR/app.log" 2>&1 &
          echo $! > "$APP_DIR/app.pid"

          echo "[5/5] Health check..."
          sleep 5
          if curl -fsS http://127.0.0.1:3000 >/dev/null; then
            echo "=== Deploy completed ==="
          else
            echo "ERROR: App health check failed"
            tail -100 "$APP_DIR/app.log"
            exit 1
          fi
          ENDSSH
